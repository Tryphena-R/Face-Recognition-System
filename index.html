<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognition Software</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#191716] text-[#e0e2db] font-sans flex flex-col items-center justify-center min-h-screen p-4 md:p-8">

    <div class="w-full max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="md:col-span-2">
            <div id="camera-container" class="relative w-full rounded-lg overflow-hidden shadow-2xl bg-[#000000] aspect-[3/4] md:aspect-video mb-4">
                <video id="video" autoplay muted playsinline></video>
                <img id="uploadedImage" class="hidden" />
                <canvas id="canvas"></canvas>
                
                <div id="loader" class="absolute inset-0 flex items-center justify-center bg-[#191716] bg-opacity-75">
                    <div class="loader"></div>
                </div>

                <button id="cameraToggleButton" class="absolute bottom-4 right-4 bg-black bg-opacity-50 hover:bg-opacity-75 transition-all rounded-full p-3 text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-[#191716] focus:ring-[#e6af2e]">
                    </button>
            </div>

            <div id="status" class="h-8 mb-4 text-lg text-center font-medium">Initializing...</div>

            <div class="flex flex-wrap justify-center gap-4">
                <input type="file" id="imageUpload" class="hidden" accept="image/*">
                <button id="uploadButton" class="px-6 py-2 rounded-md font-semibold text-white bg-purple-600 hover:bg-purple-700 transition-colors disabled:bg-gray-600 disabled:opacity-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-[#191716] focus:ring-purple-500">
                    Upload Image
                </button>
                <button id="recognizeButton" disabled class="px-6 py-2 rounded-md font-semibold text-[#e0e2db] bg-green-600 hover:bg-green-700 transition-colors disabled:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-[#191716] focus:ring-green-500">
                    Start Recognition
                </button>
                <button id="backToCameraButton" class="hidden px-6 py-2 rounded-md font-semibold text-[#e0e2db] bg-gray-600 hover:bg-gray-700 transition-colors">
                    Back to Camera
                </button>
            </div>
        </div>

        <div class="bg-[#2a2726] p-6 rounded-lg shadow-2xl flex flex-col">
            <h2 class="text-2xl font-bold text-[#e0e2db] mb-4">Manage Faces</h2>
            
            <div class="mb-4">
                <label for="nameInput" class="block text-sm font-medium text-gray-400 mb-1">Name</label>
                <input type="text" id="nameInput" placeholder="Enter name to enroll" class="w-full bg-[#3b3837] border border-[#5c5857] text-[#e0e2db] rounded-md px-3 py-2 focus:ring-2 focus:ring-[#e6af2e] focus:outline-none">
            </div>
            
            <input type="file" id="enrollImageUpload" class="hidden" accept="image/*">
            <div class="space-y-2 mb-6">
                <button id="enrollFromCameraButton" disabled class="w-full px-6 py-2 rounded-md font-semibold text-[#191716] bg-[#e6af2e] hover:bg-[#cca029] transition-colors disabled:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-[#2a2726] focus:ring-[#e6af2e]">
                    Enroll from Camera
                </button>
                <button id="enrollFromImageButton" disabled class="w-full px-6 py-2 rounded-md font-semibold text-white bg-teal-600 hover:bg-teal-700 transition-colors disabled:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-[#2a2726] focus:ring-teal-500">
                    Enroll from Image
                </button>
            </div>

            <h3 class="text-lg font-semibold text-[#e0e2db] mb-2">Enrolled Persons</h3>
            <div id="enrolledListContainer" class="flex-grow overflow-y-auto bg-[#191716] p-2 rounded-md border border-[#5c5857]">
                <ul id="enrolledList" class="space-y-2">
                    </ul>
            </div>
            <button id="clearAllButton" class="mt-4 w-full px-6 py-2 rounded-md font-semibold text-[#e0e2db] bg-red-700 hover:bg-red-800 transition-colors disabled:bg-gray-600 disabled:opacity-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-[#2a2726] focus:ring-red-600">
                Clear All Faces
            </button>
        </div>
    </div>

    <div id="confirmationModal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center hidden z-50">
        <div class="bg-[#2a2726] p-6 rounded-lg shadow-xl text-center w-full max-w-sm border border-[#5c5857]">
            <p id="modalMessage" class="text-lg text-[#e0e2db] mb-6">Are you sure?</p>
            <div class="flex justify-center gap-4">
                <button id="modalConfirmBtn" class="px-6 py-2 rounded-md font-semibold text-[#e0e2db] bg-red-700 hover:bg-red-800">Confirm</button>
                <button id="modalCancelBtn" class="px-6 py-2 rounded-md font-semibold text-[#191716] bg-[#e0e2db] hover:bg-gray-300">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
